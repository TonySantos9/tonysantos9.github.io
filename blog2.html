---
layout: default
title: Blog
permalink: blog2
---

<div class="posts">
  {%- comment -%} List with sorted from recent to old {%- endcomment -%}
  {% assign lt = site.data.posts | sort: 'date' | reverse %}
  {% for item in lt %}
  <div class="post">
    <h1 class="post-title">
      <a href="{{ item.link }}">
        {{ item.title }}
      </a>
    </h1>
    <span class="post-date">{{ item.date | date_to_long_string }}</span>

    <!-- {{ item.excerpt }}  -->
    <!-- {{ item.content }} -->
  </div>
  {% endfor %}
</div>
